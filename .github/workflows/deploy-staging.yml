name: Deploy to Staging

# Deploys the staging branch to staging.walter.pollardjr.com
# Merge feature branches → staging to preview before promoting to main/prod.
on:
  push:
    branches: ["staging"]
  workflow_dispatch:

concurrency:
  group: "staging-deploy"
  cancel-in-progress: false

jobs:
  test:
    name: Lint · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --passWithNoTests --ci

  build-and-deploy:
    name: Build · Deploy Staging
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env

      - name: Build static export (staging)
        run: npm run deploy:build
        env:
          NEXT_PUBLIC_BASE_URL: https://staging.walter.pollardjr.com

      - name: Verify build output
        run: |
          echo "Staging build completed. Checking output..."
          ls -la out/
          echo "Total files:"
          find out/ -type f | wc -l

      - name: Create staging directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Backing up current staging deployment..."
            if [ -d "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp" ]; then
              mv "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp" \
                 "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp-backup-$(date +%Y%m%d_%H%M%S)" \
                 || echo "Backup failed, continuing..."
            fi
            mkdir -p "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp"

      - name: Upload files to staging via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "out/*"
          target: "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp/"
          strip_components: 1
          rm: false

      - name: Restore heavy static assets from previous deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            BACKUP=$(ls -td "${{ secrets.STAGING_DEPLOY_PATH }}"/senderApp-backup-* 2>/dev/null | head -1)
            if [ -n "$BACKUP" ]; then
              for dir in bgs gifs; do
                if [ -d "$BACKUP/$dir" ]; then
                  cp -r "$BACKUP/$dir" "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp/"
                  echo "Restored $dir from $BACKUP"
                else
                  echo "$dir not found in backup — skipping"
                fi
              done
            else
              echo "No backup found — skipping asset restore (first deploy?)"
            fi

      - name: Set permissions and report
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            find "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp" -type f -exec chmod 644 {} \;
            find "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp" -type d -exec chmod 755 {} \;
            echo "Staging deployment complete!"
            echo "URL: https://staging.walter.pollardjr.com"
            echo "Files deployed to: ${{ secrets.STAGING_DEPLOY_PATH }}/senderApp"
            find "${{ secrets.STAGING_DEPLOY_PATH }}/senderApp" -type f | wc -l

      - name: Clean up old staging backups (keep last 2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd "${{ secrets.STAGING_DEPLOY_PATH }}"
            ls -t senderApp-backup-* 2>/dev/null | tail -n +3 | xargs rm -rf || echo "No old backups to clean"
