name: CI

# Runs on every PR and on all branch pushes (including main).
# Does NOT deploy — only validates the code is healthy.
on:
  pull_request:
  push:
    branches-ignore:
      - staging

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --passWithNoTests --ci

      - name: Build check (production static export)
        run: npm run build:production
        env:
          # Build check always uses the prod URL — this is just a validation run.
          NEXT_PUBLIC_BASE_URL: https://walter.pollardjr.com
